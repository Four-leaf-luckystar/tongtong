        body {

            border: 8px solid #f0f0f0;

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 26px 0 26px;
            color: #000;
            z-index: 9999;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;

        .status-left {

            gap: 4px;
        }

        /* 鐢垫睜UI */
        .battery-wrapper {

            align-items: center;
            margin-left: 1px;
        }
        
        .battery-body {

            padding: 1px;
            display: flex;
            align-items: center;
        }
        
        .battery-fill {
            height: 100%;
            background-color: #000;
            border-radius: 1.5px;
            width: 85%;
            transition: width 0.3s ease;
        }
        
        .battery-nub {
            width: 1.2px;
            height: 3.5px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 0 1.5px 1.5px 0;
        }

            font-size: 14px;
            font-weight: bold;
            color: #333;

        /* 妗岄潰 4x7 缃戞牸 */
        .desktop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(7, 80px);
            gap: 15px 10px;
            padding: 25px 20px;
            margin-top: 30px;
            height: calc(100% - 180px);
            position: relative;
            z-index: 5;

        .desktop-slot {

            height: 100%;

            justify-content: center;
            align-items: flex-start;
            border-radius: 16px;
            transition: background-color 0.2s, border 0.2s;
            border: 1px solid transparent;

        .desktop-slot.show-grid {

            border: 1px dashed rgba(0, 0, 0, 0.15);
        }

        /* APP 鍥炬爣瀹瑰櫒 */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            touch-action: none;
            cursor: default;
            position: relative;
            width: 100%;

        .app-icon {

            border-radius: 16px;

            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            pointer-events: none;
            background-size: cover;
            background-position: center;
        }

        .app-icon::before {
            content: '';
            width: 30px;
            height: 30px;
            background-color: #f0f0f0;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

            font-size: 12px;

            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
            font-weight: bold;
            pointer-events: none;
        }

            -webkit-backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #555;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 5;
        }

        /* 搴曢儴绋嬪簭鍧?(Dock) */
        .dock {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            height: 85px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            display: flex;

            align-items: center;

        .dock .app-icon {

        @keyframes jiggle {

            100% { transform: rotate(-1.5deg); }

            will-change: transform;
            transform: translateZ(0);

<script>

            // show three-dots button; click to expand vertical capsule menu
    function showCustomAlert(title, message) {
        return new Promise(resolve => {
            const overlay = document.getElementById('customDialogOverlay');
            const dialog = document.getElementById('customDialog');
            
            dialog.innerHTML = `
                <div class="custom-dialog-text">
                    <div class="custom-dialog-title">${title}</div>
                    <div class="custom-dialog-message">${message}</div>
                </div>
                <div class="custom-dialog-btns">
                    <button class="custom-dialog-btn bold" id="customAlertBtn">濂?/button>
                </div>
            `;
            
            document.getElementById('customAlertBtn').onclick = () => {
                overlay.classList.remove('show');
                setTimeout(() => resolve(), 300);
            };
            
            overlay.classList.add('show');
        });
    }

    function showCustomConfirm(title, message, confirmText = '纭畾', isDanger = false) {
        return new Promise(resolve => {
            const overlay = document.getElementById('customDialogOverlay');
            const dialog = document.getElementById('customDialog');
            
            const dangerClass = isDanger ? 'danger bold' : 'bold';
            
            dialog.innerHTML = `
                <div class="custom-dialog-text">
                    <div class="custom-dialog-title">${title}</div>
                    <div class="custom-dialog-message">${message}</div>
                </div>
                <div class="custom-dialog-btns">
                    <button class="custom-dialog-btn" id="customConfirmCancel">鍙栨秷</button>
                    <button class="custom-dialog-btn ${dangerClass}" id="customConfirmOk">${confirmText}</button>
                </div>
            `;
            
            document.getElementById('customConfirmCancel').onclick = () => {
                overlay.classList.remove('show');
                setTimeout(() => resolve(false), 300);
            };
            
            document.getElementById('customConfirmOk').onclick = () => {
                overlay.classList.remove('show');
                setTimeout(() => resolve(true), 300);
            };
            
            overlay.classList.add('show');
        });
    }

            // show three-dots button; click to expand vertical capsule menu
    function showCustomPrompt(title, inputs, confirmText = '纭畾') {
        return new Promise(resolve => {
            let overlay = document.getElementById('customPromptOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'preset-modal-overlay';
                overlay.id = 'customPromptOverlay';
                document.querySelector('.iphone').appendChild(overlay);
            }
            
            let inputConfigs = [];
            if (typeof inputs === 'string') {
                inputConfigs = [{ placeholder: inputs, value: '' }];
            } else if (Array.isArray(inputs)) {
                inputConfigs = inputs;
            } else if (typeof inputs === 'object') {
                inputConfigs = [inputs];
            }

            let inputsHtml = inputConfigs.map((cfg, idx) => `
                <input type="${cfg.type || 'text'}" class="preset-m1-input" id="customPromptInput_${idx}" placeholder="${cfg.placeholder || ''}" value="${cfg.value || ''}" style="margin-bottom: ${idx < inputConfigs.length - 1 ? '12px' : '0'};">
            `).join('');

            overlay.innerHTML = `
                <div class="preset-modal-style-1">
                    <div class="preset-m-header">
                        <div class="preset-m-header-text">${title}</div>
                        <div class="preset-m-stars">
                            <svg class="preset-star-1" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            <svg class="preset-star-2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            <svg class="preset-star-3" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                    </div>
                    <div class="preset-m1-body">
                        ${inputsHtml}
                    </div>
                    <div class="preset-m1-footer">
                        <button class="preset-m1-btn preset-m1-btn-cancel" id="customPromptCancel">鍙栨秷</button>
                        <button class="preset-m1-btn preset-m1-btn-save" id="customPromptOk">${confirmText}</button>
                    </div>
                </div>
            `;

            const btnCancel = overlay.querySelector('#customPromptCancel');
            const btnOk = overlay.querySelector('#customPromptOk');

            btnCancel.onclick = () => {
                overlay.classList.remove('show');
                setTimeout(() => resolve(null), 300);
            };

            btnOk.onclick = () => {
                const results = inputConfigs.map((_, idx) => overlay.querySelector(`#customPromptInput_${idx}`).value);
                overlay.classList.remove('show');
                setTimeout(() => resolve(results.length === 1 ? results[0] : results), 300);
            };

            overlay.classList.add('show');
            setTimeout(() => {
                const firstInput = overlay.querySelector('#customPromptInput_0');
                if (firstInput) {
                    firstInput.focus();
                    if(firstInput.value) {
                        firstInput.selectionStart = firstInput.selectionEnd = firstInput.value.length;
                    }
                }
            }, 100);
        });
    }

        toast.innerText = message;
        toast.classList.add('show');
        
        if (toast.hideTimer) clearTimeout(toast.hideTimer);
        
        toast.hideTimer = setTimeout(() => {

    }

            // show three-dots button; click to expand vertical capsule menu
    const clockElement = document.getElementById('clock');
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        if (clockElement) clockElement.textContent = `${hours}:${minutes}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    function updateBattery(level) {
        const percentage = Math.round(level * 100);
        document.getElementById('batteryLevel').style.width = percentage + '%';
        const batteryText = document.getElementById('batteryText');
        if (batteryText) batteryText.textContent = percentage;
    }

    if ('getBattery' in navigator) {
        navigator.getBattery().then(function(battery) {
            updateBattery(battery.level);
            battery.addEventListener('levelchange', function() {
                updateBattery(battery.level);
            });
        });
    } else {
        updateBattery(0.85);
    }

            // show three-dots button; click to expand vertical capsule menu
    const dbName = "iOSDesktopDB";
    const storeName = "layoutStore";
    let db;

    function initDB() {
            // show three-dots button; click to expand vertical capsule menu
        const request = indexedDB.open(dbName); 
        
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id" });
            }
        };

        request.onsuccess = (e) => {
            db = e.target.result;
            // show three-dots button; click to expand vertical capsule menu
            if (!db.objectStoreNames.contains(storeName)) {
                const currentVersion = db.version;
                db.close();
                const upgradeRequest = indexedDB.open(dbName, currentVersion + 1);
                upgradeRequest.onupgradeneeded = (e2) => {
                    const db2 = e2.target.result;
                    if (!db2.objectStoreNames.contains(storeName)) {
                        db2.createObjectStore(storeName, { keyPath: "id" });
                    }
                };
                upgradeRequest.onsuccess = (e2) => {
                    db = e2.target.result;
                    loadLayout();
                };
                upgradeRequest.onerror = (e2) => {
                    console.error("IndexedDB upgrade error:", e2);
                    renderDefaultLayout();
                };
                return;
            }
            loadLayout();
        };

        request.onerror = (e) => {
            console.error("IndexedDB error:", e);
            renderDefaultLayout(); // 鍙戠敓閿欒鏃堕檷绾ф樉绀洪粯璁ゅ竷灞€
        };
    }

    function saveLayout() {
        if (!db) return;
        const desktopApps = [];
        document.querySelectorAll('#desktopGrid .desktop-slot').forEach((slot, index) => {
            const app = slot.querySelector('.app-item');
            if (app) {
                const iconEl = app.querySelector('.app-icon');
                const iconBg = iconEl.style.backgroundImage;
                const appId = app.getAttribute('data-app-id');
                desktopApps.push({ 
                    index, 
                    name: app.querySelector('.app-name').innerText,
                    icon: iconBg !== '' && iconBg !== 'none' ? iconBg : null,
                    appId: appId
                });
            }
        });

        const dockApps = [];
        document.querySelectorAll('#dock .app-item').forEach((app, index) => {
            const iconEl = app.querySelector('.app-icon');
            const iconBg = iconEl.style.backgroundImage;
            const appId = app.getAttribute('data-app-id');
            dockApps.push({ 
                index, 
                name: app.querySelector('.app-name').innerText,
                icon: iconBg !== '' && iconBg !== 'none' ? iconBg : null,
                appId: appId
            });
        });

        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.put({ id: "currentLayout", desktop: desktopApps, dock: dockApps });
        
        if (typeof triggerAutoLocalBackup === 'function') triggerAutoLocalBackup();
    }

    function loadLayout() {
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        const request = store.get("currentLayout");

        request.onsuccess = (e) => {
            const data = e.target.result;
            // show three-dots button; click to expand vertical capsule menu
            if (data && Array.isArray(data.desktop) && Array.isArray(data.dock)) {
                renderLayout(data.desktop, data.dock);
            } else {
            // show three-dots button; click to expand vertical capsule menu
                renderDefaultLayout();
            }
        };

            // show three-dots button; click to expand vertical capsule menu
        const wpRequest = store.get("wallpaperData");
        wpRequest.onsuccess = (e) => {
            const wpData = e.target.result;
            if (wpData && wpData.wallpapers) {
                wallpapers = wpData.wallpapers;
                if (wpData.current) {
                    applyWallpaperToDesktop(wpData.current);
                }
            }
            renderWallpapers();
        };

            // show three-dots button; click to expand vertical capsule menu
        const presetRequest = store.get("presetData");
        presetRequest.onsuccess = (e) => {
            const pData = e.target.result;
            if (pData && pData.presets) {
                presets = pData.presets;
            }
            
            // show three-dots button; click to expand vertical capsule menu
            const hasDefault = presets.find(p => p.id === "default_theme_001");
            if (!hasDefault) {
                const defaultPreset = {
                    id: "default_theme_001",
                    name: "榛樿涓婚",
                    date: "绯荤粺鍐呯疆",
                    wallpaper: null,
                    sizeMB: 0.01,
                    desktop: [
                        { index: 0, name: '璁剧疆', appId: 'settings', icon: "url('https://cac.opple.com/yc-media/getFile?id=5b0f2ceab564421096b8a761f125b9f8#.jpg')" }, 
                        { index: 1, name: 'wechat', icon: "url('https://www.yn12377.cn/jubao/upload/smjb/2026/07/13/e4b01d48b8ad4a5b82879231b5376827.png')" },
                        { index: 2, name: 'Contacts', icon: "url('https://file.zhuyitai.com/feedback/202607/13/21b50befb04dae331997fec05eaa0d25.png')" }, 
                        { index: 3, name: '涓栫晫涔?, icon: "url('https://wxkb-res-1258476243.cos.ap-shanghai.myqcloud.com/web/img/8848100788856671/1L7mKgmQ7qzXUq1S34ehFM_20260713082207#.png')" }
                    ],
                    dock: [
                        { index: 0, name: '鐢佃瘽', icon: "url('https://xffkws.iflytek.com/group1/M01/09/0B/rB_aXmpUoCqAUSc8AAHTcnjGP3Q336.png')" }, 
                        { index: 1, name: '淇℃伅', icon: "url('https://wxkb-res-1258476243.cos.ap-shanghai.myqcloud.com/web/img/8848100788856671/jRVvCDUWmZhAzGjBjgMKqg_20260713082218#.png')" }, 
                        { index: 2, name: '涓婚', appId: 'theme', icon: "url('https://xiuxiu-pro-new.meitudata.com/bizshoot/6a54a036dfcc02hklfme5i6442.png')" }
                    ]
                };
                presets.unshift(defaultPreset); // 鎻掑叆鍒版渶鍓嶉潰
                savePresetData(); // 淇濆瓨鍒版暟鎹簱
            }
        };

            // show three-dots button; click to expand vertical capsule menu
        const fontRequest = store.get("fontData");
        fontRequest.onsuccess = (e) => {
            const fData = e.target.result;
            if (fData && fData.fonts) {
                customFonts = fData.fonts;
                currentSelectedFont = fData.current || 'default';
                restoreFonts();
            } else {
            // show three-dots button; click to expand vertical capsule menu
                selectFont('default', document.querySelector('.font-list-item[data-font="default"]'), true);
            }
        };

            // show three-dots button; click to expand vertical capsule menu
        const apiRequest = store.get("apiData");
        apiRequest.onsuccess = (e) => {
            const aData = e.target.result;
            if (aData && aData.list) {
                apiDataList = aData.list;
                apiConnectedId = aData.connectedId;
            }
        };

            // show three-dots button; click to expand vertical capsule menu
        const profileRequest = store.get("profileData");
        profileRequest.onsuccess = (e) => {
            const pData = e.target.result;
            if (pData && pData.avatar) {
                const appleIdAvatar = document.getElementById('appleIdAvatarPreview');
                const settingsAvatar = document.getElementById('settingsAvatarPreview');
                if (appleIdAvatar) {
                    appleIdAvatar.innerHTML = '';
                    appleIdAvatar.style.backgroundImage = `url('${pData.avatar}')`;
                    appleIdAvatar.style.backgroundSize = 'cover';
                    appleIdAvatar.style.backgroundPosition = 'center';
                }
                if (settingsAvatar) {
                    settingsAvatar.innerHTML = '';
                    settingsAvatar.style.backgroundImage = `url('${pData.avatar}')`;
                    settingsAvatar.style.backgroundSize = 'cover';
                    settingsAvatar.style.backgroundPosition = 'center';
                }
            }
        };

            // show three-dots button; click to expand vertical capsule menu
        const ldRequest = store.get("localDriveSettings");
        ldRequest.onsuccess = (e) => {

    function handleIconLocalUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_SIZE = 256;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64Url = canvas.toDataURL('image/webp', 0.95);
                    applyIconToApp(base64Url);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        event.target.value = '';
        closeIconMenu();
    }

    function handleWallpaperUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
            // show three-dots button; click to expand vertical capsule menu
            // show three-dots button; click to expand vertical capsule menu
                    const MAX_WIDTH = 1170;
                    const MAX_HEIGHT = 2532;
                    
                    let width = img.width;
                    let height = img.height;
                    
            // show three-dots button; click to expand vertical capsule menu
                    if (width > MAX_WIDTH || height > MAX_HEIGHT) {
                        const ratio = Math.min(MAX_WIDTH / width, MAX_HEIGHT / height);
                        width = Math.round(width * ratio);
                        height = Math.round(height * ratio);
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
            // show three-dots button; click to expand vertical capsule menu
                    const base64Url = canvas.toDataURL('image/jpeg', 0.95);
                    
                    const newWallpaper = {
                        id: Date.now().toString(),
                        isAdd: false,
                        src: base64Url
                    };
                    wallpapers.splice(1, 0, newWallpaper); // 鎻掑叆鍒版坊鍔犳寜閽悗闈?
                    renderWallpapers();
                    saveWallpaperData();
                    
                    const carouselScroll = document.getElementById('carouselScroll');
                    setTimeout(() => {
                        carouselScroll.scrollTo({ left: carouselScroll.clientWidth, behavior: 'smooth' });
                    }, 100);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        event.target.value = '';
    }

    function extractBase64FromUrl(cssUrl) {
        if (!cssUrl) return null;
        const match = cssUrl.match(/url\(['"]?(data:image\/[^'"]+)['"]?\)/);
        return match ? match[1] : null;
    }

    function compressImageBase64(base64Str, maxWidth, quality, callback) {
        if (!base64Str || !base64Str.startsWith('data:image')) {
            callback(base64Str);
            return;
        }
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
                height *= maxWidth / width;
                width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            callback(canvas.toDataURL('image/webp', quality));
        };
        img.onerror = function() {
            callback(base64Str);
        };
        img.src = base64Str;
    }

    function compressPreset() {
        if (!currentDetailPresetId) return;
        const preset = presets.find(p => p.id === currentDetailPresetId);
        if (!preset) return;

        const sizeEl = document.getElementById('detailSize');
        sizeEl.innerText = '鍘嬬缉涓?..';

        let tasks = [];

            // show three-dots button; click to expand vertical capsule menu
        if (preset.wallpaper && preset.wallpaper.startsWith('data:image')) {
            tasks.push(new Promise(resolve => {
                compressImageBase64(preset.wallpaper, 1080, 0.8, (newBase64) => {
                    preset.wallpaper = newBase64;
                    resolve();
                });
            }));
        }

            // show three-dots button; click to expand vertical capsule menu
        if (preset.desktop) {
            preset.desktop.forEach(app => {
                if (app.icon) {
                    const base64 = extractBase64FromUrl(app.icon);
                    if (base64) {
                        tasks.push(new Promise(resolve => {
                            compressImageBase64(base64, 256, 0.9, (newBase64) => {
                                app.icon = `url('${newBase64}')`;
                                resolve();
                            });
                        }));
                    }
                }
            });
        }

            // show three-dots button; click to expand vertical capsule menu
        if (preset.dock) {
            preset.dock.forEach(app => {
                if (app.icon) {
                    const base64 = extractBase64FromUrl(app.icon);
                    if (base64) {
                        tasks.push(new Promise(resolve => {
                            compressImageBase64(base64, 256, 0.9, (newBase64) => {
                                app.icon = `url('${newBase64}')`;
                                resolve();
                            });
                        }));
                    }
                }
            });
        }

        Promise.all(tasks).then(() => {
            // show three-dots button; click to expand vertical capsule menu
            preset.sizeMB = calculatePresetSize(preset);
            
            // show three-dots button; click to expand vertical capsule menu
            let finalSizeKB = preset.sizeMB * 1024;

    }

            // show three-dots button; click to expand vertical capsule menu
    async function updateRealStorage() {
            // show three-dots button; click to expand vertical capsule menu
        if (navigator.storage && navigator.storage.estimate) {
            try {
                const estimate = await navigator.storage.estimate();
                const usage = estimate.usage || 0;
                const quota = estimate.quota || 1;
                const percentage = Math.max(Math.min((usage / quota) * 100, 100), 1).toFixed(1);
                const mainProgressEl = document.getElementById('ic-main-progress');
                if(mainProgressEl) mainProgressEl.style.width = `${percentage}%`;
            } catch (e) {
                console.error("Storage estimate failed:", e);
            }
        }
        
            // show three-dots button; click to expand vertical capsule menu
        if (navigator.storage && navigator.storage.persisted) {
            const isPersisted = await navigator.storage.persisted();
            const persistStatusEl = document.getElementById('ic-persist-status');
            if(persistStatusEl) {
                persistStatusEl.innerHTML = `${isPersisted ? '宸插紑鍚? : '鏈紑鍚?} <svg class="ic-chevron" viewBox="0 0 8 13"><path d="M1.5 1.5L6.5 6.5L1.5 11.5"/></svg>`;
                if(isPersisted) persistStatusEl.style.color = '#34c759'; // 寮€鍚樉绀虹豢鑹?
            }
        }

            // show three-dots button; click to expand vertical capsule menu
        const getStoreSize = (key) => {
            return new Promise((resolve) => {
                if (!db) { resolve(0); return; }
                const transaction = db.transaction([storeName], "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = (e) => {
                    const data = e.target.result;
                    if (data) {
                        const jsonString = JSON.stringify(data);
                        resolve(jsonString.length);
                    } else {
                        resolve(0);
                    }
                };
                request.onerror = () => resolve(0);
            });
        };

        const formatMB = (bytes) => {
            if (bytes === 0) return '0 MB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        };

            // show three-dots button; click to expand vertical capsule menu
        const wallpaperSize = await getStoreSize("wallpaperData");
        const presetSize = await getStoreSize("presetData");
        const layoutSize = await getStoreSize("currentLayout");
        const fontSize = await getStoreSize("fontData");
        const profileSize = await getStoreSize("profileData");
        const apiSize = await getStoreSize("apiData");

            // show three-dots button; click to expand vertical capsule menu
        const photoSize = wallpaperSize; // 澹佺焊褰掍负鐓х墖
        const appsSize = presetSize + layoutSize; // 棰勮鍜屾闈㈠竷灞€褰掍负搴旂敤绋嬪簭
        const chatSize = 0; // 鑱婂ぉ鏁版嵁鏆傛棤锛屾樉绀?
        const systemSize = fontSize + profileSize + apiSize; // 瀛椾綋銆侀厤缃瓑褰掍负绯荤粺鏁版嵁

        const themeSize = presetSize + wallpaperSize + fontSize;
        const settingsSize = profileSize + apiSize + layoutSize;
        
        const totalBytes = photoSize + appsSize + chatSize + systemSize;
        const totalMB = totalBytes === 0 ? '0.00 MB' : (totalBytes / (1024 * 1024)).toFixed(2) + ' MB';

            // show three-dots button; click to expand vertical capsule menu
        const formatSizeStr = (bytes) => {
            if (bytes === 0) return '0 MB';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        };

        const themeMB = formatMB(themeSize);
        const settingsMB = formatMB(settingsSize);
        const zeroMB = '0 MB';

            // show three-dots button; click to expand vertical capsule menu
        const mainSizeEl = document.getElementById('ic-main-size');
        if(mainSizeEl) mainSizeEl.innerHTML = `${totalMB} <svg class="ic-chevron" viewBox="0 0 8 13"><path d="M1.5 1.5L6.5 6.5L1.5 11.5"/></svg>`;
        
        const detailSizeEl = document.getElementById('ic-detail-size');
        if(detailSizeEl) detailSizeEl.innerText = `宸蹭娇鐢?${totalMB}`;

            // show three-dots button; click to expand vertical capsule menu
        const legendPhoto = document.getElementById('ic-legend-photo');
        if(legendPhoto) legendPhoto.innerText = `鐓х墖 ${formatSizeStr(photoSize)}`;
        
        const legendApps = document.getElementById('ic-legend-apps');
        if(legendApps) legendApps.innerText = `搴旂敤绋嬪簭 ${formatSizeStr(appsSize)}`;
        
        const legendChat = document.getElementById('ic-legend-chat');
        if(legendChat) legendChat.innerText = `鑱婂ぉ鏁版嵁 ${formatSizeStr(chatSize)}`;
        
        const legendSystem = document.getElementById('ic-legend-system');
        if(legendSystem) legendSystem.innerText = `绯荤粺鏁版嵁 ${formatSizeStr(systemSize)}`;

            // show three-dots button; click to expand vertical capsule menu
        const getPercent = (part, total) => total === 0 ? 0 : (part / total * 100).toFixed(1);
        
        const segRed = document.getElementById('ic-seg-red');
        const segOrange = document.getElementById('ic-seg-orange');
        const segGray = document.getElementById('ic-seg-gray');
        const segLight = document.getElementById('ic-seg-light');
        
        if(segRed) segRed.style.width = `${getPercent(photoSize, totalBytes)}%`;
        if(segOrange) segOrange.style.width = `${getPercent(appsSize, totalBytes)}%`;
        if(segGray) segGray.style.width = `${getPercent(chatSize, totalBytes)}%`;
        if(segLight) segLight.style.width = `${getPercent(systemSize, totalBytes)}%`;

            // show three-dots button; click to expand vertical capsule menu

    async function getAllDataFromDB() {

            if (!db) return resolve({});
            const transaction = db.transaction([storeName], "readonly");

                resolve(dataObj);
            };

    function processZipImport(file) {
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const zip = await JSZip.loadAsync(e.target.result);
            // show three-dots button; click to expand vertical capsule menu
                let jsonFile = zip.file("backup_data.json");
                
            // show three-dots button; click to expand vertical capsule menu
                if (!jsonFile) {
                    const files = Object.keys(zip.files).filter(name => name.endsWith('.json'));
                    if (files.length > 0) {
                        jsonFile = zip.file(files[0]);
                    }
                }

                if (!jsonFile) {
                    showCustomAlert("閿欒", "ZIP 鏂囦欢涓湭鎵惧埌 JSON 澶囦唤鏁版嵁锛?);
                    return;
                }

                const content = await jsonFile.async("string");
                processJsonImport(content);
            } catch (err) {
                showCustomAlert("閿欒", "瑙ｆ瀽 ZIP 鏂囦欢澶辫触: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    async function performLocalBackup(isAuto = false) {
        if (!localDriveHandle || !localDriveMode) {
            if (!isAuto) showCustomAlert("鎻愮ず", "璇峰厛閫夋嫨鏂囦欢澶规ā寮忔垨鍗曟枃浠舵ā寮忋€?);
            return;
        }
        
        try {
            // show three-dots button; click to expand vertical capsule menu
            if (typeof localDriveHandle.queryPermission !== 'function') {
                if (isAuto) return;
                showCustomAlert("鎻愮ず", "鎺堟潈宸插け鏁堬紝璇烽噸鏂扮偣鍑汇€愭枃浠跺す妯″紡銆戞垨銆愬崟鏂囦欢妯″紡銆戦€夋嫨璺緞銆?);
                return;
            }

            // show three-dots button; click to expand vertical capsule menu
            const permission = await localDriveHandle.queryPermission({ mode: 'readwrite' });
            if (permission !== 'granted') {
                if (isAuto) {
                    console.warn("鑷姩澶囦唤琚嫤鎴細娴忚鍣ㄨ姹傜敤鎴锋墜鍔ㄦ巿鏉冦€?);
                    return; // 鑷姩澶囦唤涓嶈兘瑙﹀彂鎺堟潈寮圭獥
                }
                const request = await localDriveHandle.requestPermission({ mode: 'readwrite' });
                if (request !== 'granted') {
                    showCustomAlert("鎻愮ず", "鏈幏寰楄鍐欐潈闄愶紝鏃犳硶澶囦唤銆?);
                    return;
                }
            }

            let fileHandleToWrite;
            if (localDriveMode === 'folder') {
                fileHandleToWrite = await localDriveHandle.getFileHandle(localDriveFileName, { create: true });
            } else {
                fileHandleToWrite = localDriveHandle;
            }

            const writable = await fileHandleToWrite.createWritable();
            const data = await getAllDataFromDB();
            const jsonString = JSON.stringify(data, null, 2);
            await writable.write(jsonString);
            await writable.close();

            // show three-dots button; click to expand vertical capsule menu
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            const sizeMB = (jsonString.length / (1024 * 1024)).toFixed(2);

            document.getElementById('ld-last-time').innerText = timeStr + (isAuto ? ' (鑷姩)' : ' (鎵嬪姩)');
            document.getElementById('ld-last-size').innerText = sizeMB + ' MB';

            if (!isAuto) showToast("澶囦唤鎴愬姛锛?);
            saveLocalDriveSettings();
        } catch (err) {
            console.error("Local backup failed:", err);
            if (!isAuto) showCustomAlert("閿欒", "澶囦唤澶辫触: " + err.message);
        }
    }

    function startAutoBackupTimer() {
        stopAutoBackupTimer();
        if (!autoBackupEnabled) return;

        if (backupModeType === 'interval') {
            const val = parseInt(document.getElementById('backupIntervalValue').value, 10) || 30;
            const unit = parseInt(document.getElementById('backupIntervalUnit').value, 10) || 60000;
            const intervalMs = val * unit;
            
            autoBackupTimerId = setInterval(() => {
                performLocalBackup(true);
            }, intervalMs);
            showToast(`宸茶缃负姣?${val} ${unit === 60000 ? '鍒嗛挓' : '灏忔椂'} 鑷姩澶囦唤`);
            
        } else if (backupModeType === 'scheduled') {
            const timeStr = document.getElementById('backupScheduledTime').value || "02:00";
            const [hours, minutes] = timeStr.split(':').map(Number);
            
            const now = new Date();
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
            
            if (now > target) {
                target.setDate(target.getDate() + 1); // 濡傛灉浠婂ぉ鐨勬椂闂村凡杩囷紝璁惧畾涓烘槑澶?
            }
            
            const delay = target.getTime() - now.getTime();
            autoBackupTimerId = setTimeout(() => {
                performLocalBackup(true);
                startAutoBackupTimer(); // 瑙﹀彂鍚庨噸鏂拌缃浜屽ぉ鐨勫畾鏃跺櫒
            }, delay);
            showToast(`宸茶缃负姣忓ぉ ${timeStr} 鑷姩澶囦唤`);
        }
    }

    function stopAutoBackupTimer() {

            clearTimeout(autoBackupTimerId);
            autoBackupTimerId = null;
        }
    }

            // show three-dots button; click to expand vertical capsule menu

            }

            if (!newestFileHandle) {
                showCustomAlert("鎻愮ず", "璇ユ枃浠跺す涓病鏈夋壘鍒颁换浣?JSON 澶囦唤鏂囦欢銆?);
                return;
            }

            const confirmed = await showCustomConfirm("鎭㈠鏁版嵁", `鎵惧埌鏈€鏂板浠芥枃浠讹細\n${newestFileHandle.name}\n\n纭畾瑕佽鐩栧綋鍓嶆墍鏈夋暟鎹悧锛焋, "鎭㈠", true);
            if (!confirmed) return;

            showToast("姝ｅ湪璇诲彇澶囦唤鏂囦欢...");
            const file = await newestFileHandle.getFile();
            const text = await file.text();
            
            // show three-dots button; click to expand vertical capsule menu
            processJsonImport(text);

        } catch (err) {
            console.error("Restore failed:", err);
            showCustomAlert("閿欒", "鎭㈠澶辫触: " + err.message);
        }
    }
</script>

<script src="fullscreen.js"></script>
<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            try {
                const swResponse = await fetch('sw.js', { method: 'HEAD', cache: 'no-store' });
                if (!swResponse.ok) return;

                const registration = await navigator.serviceWorker.register('sw.js');
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
            } catch (err) {
                console.log('ServiceWorker registration skipped/failed: ', err);
            }
        });
    }
            // show three-dots button; click to expand vertical capsule menu
    (function () {
        const widgetTrack = document.getElementById('widgetTrack');
        const widgetPagination = document.getElementById('widgetPagination');
        const widgetListContainer = document.getElementById('widgetList');
        const widgetEmptyState = document.getElementById('widgetEmptyState');
        const widgetContentArea = document.getElementById('widgetContentArea');
        const widgetSegmentBtns = document.querySelectorAll('#widgetAppGrid .widget-segment-btn');
        const widgetIndicator = document.getElementById('widgetSegmentIndicator');
        const widgetAppGrid = document.getElementById('widgetAppGrid');
        const themeAppUI = document.getElementById('themeAppUI');

        const officialWidgets = [];
        const customWidgets = [];
        let currentWidgets = officialWidgets;

        let widgetViewMode = 'carousel';     // 'carousel' | 'list'
        let isWidgetEditing = false;
        let currentProgress = 0, targetProgress = 0;
        let isDragging = false, startX = 0, startProgress = 0;
        let activeWidgetIndex = -1;

            // show three-dots button; click to expand vertical capsule menu
        window.renderWidgetViews = renderWidgetViews;

        function hideWidgetChrome() {
            const wg = document.getElementById('widgetAppGrid'); if (wg) wg.style.display = 'none';
            const vb = document.getElementById('widgetViewBtn'); if (vb) vb.style.display = 'none';
            const wgc = document.getElementById('widgetToolbarMenu'); if (wgc) wgc.style.display = 'none';
            const dots = document.getElementById('menuIconDots'); if (dots) dots.style.display = 'none';
            const list = document.getElementById('menuIconList'); if (list) list.style.display = 'block';
            exitWidgetEditMode(true);
        }
        window.hideWidgetChrome = hideWidgetChrome;

        function closeWidgetMenus() {
            const dd = document.getElementById('themeDropdownMenu'); if (dd) dd.classList.remove('show');
            const tbm = document.getElementById('widgetToolbarMenu'); if (tbm) tbm.classList.remove('show');
            const cm = document.getElementById('widgetContextMenu'); if (cm) cm.classList.remove('show');
            const dots = document.getElementById('menuIconDots'); if (dots) dots.style.display = 'block';
            const chev = document.getElementById('menuIconChevron'); if (chev) chev.style.display = 'none';
            const overlay = document.getElementById('widgetOverlay');
            const editor = document.getElementById('widgetEditorModal');
            if (editor && editor.classList.contains('show')) {
                if (overlay) overlay.style.zIndex = '250';
            } else if (overlay) {
                overlay.style.display = 'none';
                overlay.style.zIndex = '105';
            }
        }
        window.closeWidgetMenus = closeWidgetMenus;

            // show three-dots button; click to expand vertical capsule menu
        const originalToggleThemeMenu = window.toggleThemeMenu;
        window.toggleThemeMenu = function () {
            if (currentActiveTab === "widget") {
                const m = document.getElementById("widgetToolbarMenu");
                const ov = document.getElementById("widgetOverlay");
                if (!m.classList.contains("show")) {
                    m.classList.add("show");
                    if (ov) { ov.style.display = "block"; ov.style.zIndex = "240"; }
                    const d = document.getElementById("menuIconDots"); if (d) d.style.display = "none";
                    const c = document.getElementById("menuIconChevron"); if (c) c.style.display = "block";
                } else {
                    closeWidgetMenus();
                }
                return;
            } else if (typeof originalToggleThemeMenu === "function") { originalToggleThemeMenu(); }
        };

        function openWidgetContextMenu(index, event) {
            event.stopPropagation(); activeWidgetIndex = index;
            const menu = document.getElementById('widgetContextMenu');
            const overlay = document.getElementById('widgetOverlay');
            const rect = event.currentTarget.getBoundingClientRect();
            const hostRect = (themeAppUI || document.body).getBoundingClientRect();
            let top = rect.bottom - hostRect.top + 10;
            let left = rect.right - hostRect.left - 140;
            if (top + 200 > hostRect.height) top = rect.top - hostRect.top - 190;
            if (left < 16) left = 16;
            menu.style.top = top + 'px'; menu.style.left = left + 'px';
            menu.classList.add('show');
            overlay.style.display = 'block'; overlay.style.zIndex = '350';
        }
        window.openWidgetContextMenu = openWidgetContextMenu;

        function widgetCtxAction(action) {
            closeWidgetMenus();
            if (activeWidgetIndex === -1) return;
            if (action === 'preview') { targetProgress = activeWidgetIndex; currentProgress = activeWidgetIndex; toggleWidgetViewMode('carousel'); }
            else if (action === 'edit') { openWidgetEditor(activeWidgetIndex); }
        else if (action === 'export') { 
            const widgetToExport = currentWidgets[activeWidgetIndex];
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(widgetToExport, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", widgetToExport.name + ".json");
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            document.body.removeChild(dlAnchorElem);
            closeWidgetMenus();
        }
        }
        window.widgetCtxAction = widgetCtxAction;

        function toggleWidgetViewMode(forceMode) {
            widgetViewMode = forceMode ? forceMode : (widgetViewMode === 'carousel' ? 'list' : 'carousel');
            const iL = document.getElementById('widgetIconList');
            const iC = document.getElementById('widgetIconCard');
            if (iL) iL.style.display = widgetViewMode === 'carousel' ? 'block' : 'none';
            if (iC) iC.style.display = widgetViewMode === 'list' ? 'block' : 'none';
            if (widgetViewMode === 'list') widgetContentArea.classList.add('show-list');
            else { widgetContentArea.classList.remove('show-list'); updateWidgetCardsContinuous(); }
        }
        window.toggleWidgetViewMode = toggleWidgetViewMode;

        function enterWidgetEditMode() {
            closeWidgetMenus(); isWidgetEditing = true;
            if (themeAppUI) themeAppUI.classList.add('is-widget-editing');
            toggleWidgetViewMode('list');
            document.getElementById('topBarTitle').innerText = '绠＄悊缁勪欢';
            const wgc1 = document.getElementById('widgetToolbarMenu'); if (wgc1) { wgc1.style.display = 'none'; wgc1.classList.remove('show'); }
        }
        window.enterWidgetEditMode = enterWidgetEditMode;

        function exitWidgetEditMode(silent) {
            isWidgetEditing = false;
            if (themeAppUI) themeAppUI.classList.remove('is-widget-editing');
            if (!silent && currentActiveTab === 'widget') {
                document.getElementById('topBarTitle').innerText = 'Widgets';
                const wgc2 = document.getElementById('widgetToolbarMenu'); if (wgc2) { wgc2.style.display = 'flex'; wgc2.classList.remove('show'); }
            }
        }
        window.exitWidgetEditMode = exitWidgetEditMode;

        function deleteWidget(index, event) {
            event.stopPropagation();
            if (confirm('纭畾瑕佸垹闄?"' + currentWidgets[index].name + '" 鍚楋紵')) {
                currentWidgets.splice(index, 1);
                if (activeWidgetIndex >= currentWidgets.length) activeWidgetIndex = currentWidgets.length - 1;
                renderWidgetViews();
            }
        }
        window.deleteWidget = deleteWidget;


        // import widgets from a .json file (single object or array). Fields: name, preview, content.
        function handleWidgetJsonImport(event) {
            closeWidgetMenus();
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                try {
                    let parsed = JSON.parse(ev.target.result);
                    if (!Array.isArray(parsed)) parsed = [parsed];
                    let added = 0;
                    parsed.forEach(function (w) {
                        if (!w || typeof w !== 'object') return;
                        customWidgets.push({
                            name: w.name || ('widget ' + (customWidgets.length + 1)),
                            preview: w.preview || 'linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%)',
                            content: w.content || w.html || ''
                        });
                        added++;
                    });
                    // switch to custom tab so the user sees imports immediately
                    if (typeof switchWidgetTab === 'function') switchWidgetTab(1);
                    else { currentWidgets = customWidgets; renderWidgetViews(); }
                    alert('imported ' + added + ' widget(s)');
                } catch (err) { alert('JSON parse failed: ' + err.message); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        window.handleWidgetJsonImport = handleWidgetJsonImport;

        function openWidgetEditor(index) {
            activeWidgetIndex = index; const widget = currentWidgets[index];
            document.getElementById('widgetEditName').value = widget.name;
            document.getElementById('widgetEditContent').value = widget.content || '';
            document.getElementById('widgetEditorModal').classList.add('show');
            const overlay = document.getElementById('widgetOverlay');
            overlay.style.display = 'block'; overlay.style.zIndex = '250';
        }
        window.openWidgetEditor = openWidgetEditor;

        function closeWidgetEditor() {
            document.getElementById('widgetEditorModal').classList.remove('show');
            const overlay = document.getElementById('widgetOverlay');
            overlay.style.display = 'none'; overlay.style.zIndex = '105';
            activeWidgetIndex = -1;
        }
        window.closeWidgetEditor = closeWidgetEditor;

        function saveWidgetEditor() {
            if (activeWidgetIndex > -1) {
                const widget = currentWidgets[activeWidgetIndex];
                widget.name = document.getElementById('widgetEditName').value.trim() || '鏈懡鍚嶇粍浠?;
                widget.content = document.getElementById('widgetEditContent').value;
                renderWidgetViews();
            }
            closeWidgetEditor();
        }
        window.saveWidgetEditor = saveWidgetEditor;

        function switchWidgetTab(index) {
            if (isWidgetEditing) return;
            widgetSegmentBtns.forEach((btn, i) => btn.classList.toggle('active', i === index));
            if (widgetIndicator) widgetIndicator.style.transform = 'translateX(' + (index * 100) + '%)';
            currentWidgets = index === 0 ? officialWidgets : customWidgets;
            currentProgress = 0; targetProgress = 0;
            renderWidgetViews();
        }
        window.switchWidgetTab = switchWidgetTab;

        function handleAddWidget() {
            closeWidgetMenus();
            currentWidgets.push({
                name: '鑷畾涔夌粍浠?' + (currentWidgets.length + 1),
                content: ''
            });
            targetProgress = currentWidgets.length - 1;
            renderWidgetViews();
        }
        window.handleAddWidget = handleAddWidget;

        function renderWidgetViews() {
            widgetTrack.innerHTML = ''; widgetPagination.innerHTML = ''; widgetListContainer.innerHTML = '';
            if (currentWidgets.length === 0) {
                widgetEmptyState.style.display = 'block';
                widgetContentArea.style.display = 'none';
                return;
            }
            widgetEmptyState.style.display = 'none';
            widgetContentArea.style.display = 'flex';

            currentWidgets.forEach((widget, i) => {
                const card = document.createElement('div'); card.className = 'widget-card';
                card.innerHTML = '<div class="widget-card-more-btn" onclick="openWidgetContextMenu(' + i + ', event)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg></div><div class="widget-card-preview">' + (widget.content || '') + '</div><div class="widget-card-name">' + widget.name + '</div>';
                widgetTrack.appendChild(card);

                const dot = document.createElement('div'); dot.className = 'widget-dot'; widgetPagination.appendChild(dot);

                const listItem = document.createElement('div'); listItem.className = 'widget-list-item';
                listItem.onclick = function () {
                    if (isWidgetEditing) openWidgetEditor(i);
                    else { targetProgress = i; currentProgress = i; toggleWidgetViewMode('carousel'); }
                };
                listItem.innerHTML = '<div class="widget-delete-btn-left" onclick="deleteWidget(' + i + ', event)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg></div><div class="widget-list-item-icon">' + (widget.content || '') + '</div><div class="widget-list-item-info"><div class="widget-title-wrapper"><div class="widget-list-item-title">' + widget.name + '</div><svg class="widget-edit-pencil" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></div><div class="widget-list-item-sub">Widget</div></div><div class="widget-list-action-trigger" onclick="openWidgetContextMenu(' + i + ', event)"><svg width="20" height="20" viewBox="0 0 24 24" fill="#c7c7cc" stroke="none"><circle cx="12" cy="5" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="12" cy="19" r="2"></circle></svg></div>';
                widgetListContainer.appendChild(listItem);
            });
            updateWidgetCardsContinuous();
        }


        function updateWidgetCardsContinuous() {
            if (currentWidgets.length === 0 || widgetViewMode === 'list') return;
            const cards = document.querySelectorAll('#widgetAppGrid .widget-card');
            const dots = document.querySelectorAll('#widgetPagination .widget-dot');
            cards.forEach((card, i) => {
                const rel = i - currentProgress; const absRel = Math.abs(rel);
                const translateX = rel * 110; const rotateY = -rel * 45; const translateZ = -absRel * 100;
                const scale = Math.max(0.8, 1 - absRel * 0.1); const opacity = Math.max(0, 1 - absRel * 0.6);
                card.style.transform = 'translateX(' + translateX + '%) translateZ(' + translateZ + 'px) rotateY(' + rotateY + 'deg) scale(' + scale + ')';
                card.style.opacity = opacity; card.style.zIndex = 100 - Math.round(absRel * 100);
            });
            dots.forEach((dot, i) => {
                dot.style.opacity = Math.max(0.3, 1 - Math.abs(i - currentProgress));
                dot.classList.toggle('active', Math.round(currentProgress) === i);
            });
        }

            // show three-dots button; click to expand vertical capsule menu
        const wCarouselArea = document.getElementById('widgetCarousel');
        if (wCarouselArea) {
            wCarouselArea.addEventListener('touchstart', function (e) {
                if (currentWidgets.length <= 1 || widgetViewMode === 'list') return;
                isDragging = true; startX = e.touches[0].clientX; startProgress = currentProgress;
            }, { passive: true });
            wCarouselArea.addEventListener('touchmove', function (e) {
                if (!isDragging || widgetViewMode === 'list') return;
                e.preventDefault();
                let newProgress = startProgress - ((e.touches[0].clientX - startX) / window.innerWidth) * 1.8;
                if (newProgress < 0) newProgress *= 0.3;
                else if (newProgress > currentWidgets.length - 1) newProgress = (currentWidgets.length - 1) + (newProgress - (currentWidgets.length - 1)) * 0.3;
                currentProgress = newProgress; updateWidgetCardsContinuous();
            }, { passive: false });
            wCarouselArea.addEventListener('touchend', function () {
                if (!isDragging || widgetViewMode === 'list') return;
                isDragging = false; targetProgress = Math.round(currentProgress);
                if (targetProgress < 0) targetProgress = 0;
                if (targetProgress > currentWidgets.length - 1) targetProgress = currentWidgets.length - 1;
            });
        }

            // show three-dots button; click to expand vertical capsule menu
        function animateWidget() {
            if (!isDragging && widgetViewMode === 'carousel') {
                currentProgress += (targetProgress - currentProgress) * 0.15;
                if (Math.abs(targetProgress - currentProgress) < 0.001) currentProgress = targetProgress;
                updateWidgetCardsContinuous();
            }
            requestAnimationFrame(animateWidget);
        }
        animateWidget();
    })();
            // show three-dots button; click to expand vertical capsule menu
</script>
</body>
</html>
